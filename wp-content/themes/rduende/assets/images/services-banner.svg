<svg viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="rduende-services-title">
	<title id="rduende-services-title">Servicios de RDuende: impresión de gran formato, rotulación de vehículos, corte láser, estampación, letras corpóreas y artículos publicitarios</title>
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#1a6fb0"/>
			<stop offset="28%" stop-color="#2ea86b"/>
			<stop offset="55%" stop-color="#f5a623"/>
			<stop offset="78%" stop-color="#e0522f"/>
			<stop offset="100%" stop-color="#7a2d8c"/>
		</linearGradient>
		<filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.18"/>
		</filter>
	</defs>

	<rect width="1200" height="520" fill="url(#bg)"/>
	<rect width="1200" height="520" fill="#000" opacity="0.08"/>

	<!-- decorative circles -->
	<circle cx="80" cy="70" r="60" fill="#fff" opacity="0.06"/>
	<circle cx="1140" cy="460" r="90" fill="#fff" opacity="0.06"/>
	<circle cx="1080" cy="60" r="30" fill="#fff" opacity="0.08"/>

	<text x="600" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="34" font-weight="700" fill="#fff">Todo lo que tu marca necesita, en un solo lugar</text>

	<!-- 6 service cards -->
	<g font-family="system-ui, sans-serif">

		<!-- 1. Gran formato -->
		<g transform="translate(60,130)">
			<rect width="330" height="190" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(28,28)">
				<rect x="0" y="10" width="70" height="90" rx="4" fill="#1a6fb0"/>
				<rect x="8" y="18" width="54" height="64" fill="#eaf4fb"/>
				<path d="M8 70 L24 46 L38 60 L54 34 L62 46 L62 82 L8 82 Z" fill="#1a6fb0" opacity="0.6"/>
				<rect x="-6" y="0" width="82" height="6" fill="#0f4a78"/>
			</g>
			<text x="120" y="50" font-size="20" font-weight="700" fill="#1f1a17">Impresión de</text>
			<text x="120" y="75" font-size="20" font-weight="700" fill="#1f1a17">gran formato</text>
			<text x="120" y="105" font-size="15" fill="#555">Vinilos, lonas,</text>
			<text x="120" y="126" font-size="15" fill="#555">cartelería y rótulos</text>
		</g>

		<!-- 2. Rotulacion vehiculos -->
		<g transform="translate(435,130)">
			<rect width="330" height="190" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(20,45)">
				<rect x="0" y="10" width="80" height="32" rx="6" fill="#2ea86b"/>
				<path d="M78 10 h20 a10 10 0 0 1 10 10 v12 h-30 z" fill="#2ea86b"/>
				<rect x="10" y="18" width="24" height="14" fill="#eafaf1"/>
				<circle cx="18" cy="46" r="8" fill="#1f1a17"/>
				<circle cx="72" cy="46" r="8" fill="#1f1a17"/>
			</g>
			<text x="120" y="50" font-size="20" font-weight="700" fill="#1f1a17">Rotulación de</text>
			<text x="120" y="75" font-size="20" font-weight="700" fill="#1f1a17">vehículos</text>
			<text x="120" y="105" font-size="15" fill="#555">Comunicación visual</text>
			<text x="120" y="126" font-size="15" fill="#555">en movimiento</text>
		</g>

		<!-- 3. Corte laser -->
		<g transform="translate(810,130)">
			<rect width="330" height="190" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(28,25)">
				<rect x="0" y="60" width="70" height="14" rx="3" fill="#e0522f" opacity="0.25"/>
				<line x1="10" y1="0" x2="55" y2="60" stroke="#e0522f" stroke-width="4"/>
				<circle cx="10" cy="0" r="6" fill="#e0522f"/>
				<polygon points="20,60 50,60 40,74 30,74" fill="#f5a623"/>
			</g>
			<text x="120" y="50" font-size="20" font-weight="700" fill="#1f1a17">Corte y grabado</text>
			<text x="120" y="75" font-size="20" font-weight="700" fill="#1f1a17">láser</text>
			<text x="120" y="105" font-size="15" fill="#555">Madera, metacrilato</text>
			<text x="120" y="126" font-size="15" fill="#555">y metal</text>
		</g>

		<!-- 4. Estampacion camisetas -->
		<g transform="translate(60,340)">
			<rect width="330" height="150" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(28,25)">
				<path d="M20 0 L40 0 L48 12 L66 6 L74 26 L60 32 L60 90 L0 90 L0 32 L-14 26 L-6 6 L12 12 Z" fill="#f5a623"/>
				<circle cx="30" cy="45" r="14" fill="#fff" opacity="0.85"/>
			</g>
			<text x="120" y="42" font-size="19" font-weight="700" fill="#1f1a17">Estampación de</text>
			<text x="120" y="66" font-size="19" font-weight="700" fill="#1f1a17">camisetas</text>
			<text x="120" y="94" font-size="14" fill="#555">Diseños duraderos para equipos</text>
		</g>

		<!-- 5. Letras corporeas -->
		<g transform="translate(435,340)">
			<rect width="330" height="150" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(28,20)">
				<text x="0" y="80" font-size="80" font-weight="800" fill="#7a2d8c">R</text>
				<rect x="6" y="86" width="60" height="10" fill="#5a2068" opacity="0.5"/>
			</g>
			<text x="120" y="42" font-size="19" font-weight="700" fill="#1f1a17">Letras</text>
			<text x="120" y="66" font-size="19" font-weight="700" fill="#1f1a17">corpóreas</text>
			<text x="120" y="94" font-size="14" fill="#555">Volumen y visibilidad de marca</text>
		</g>

		<!-- 6. Articulos publicitarios -->
		<g transform="translate(810,340)">
			<rect width="330" height="150" rx="16" fill="#fff" filter="url(#cardShadow)"/>
			<g transform="translate(28,25)">
				<path d="M0 10 h48 v50 a24 24 0 0 1 -48 0 Z" fill="#1a6fb0"/>
				<path d="M48 22 h14 a12 12 0 0 1 0 24 h-14 Z" fill="none" stroke="#1a6fb0" stroke-width="6"/>
				<rect x="8" y="0" width="32" height="10" fill="#0f4a78"/>
			</g>
			<text x="120" y="42" font-size="19" font-weight="700" fill="#1f1a17">Artículos</text>
			<text x="120" y="66" font-size="19" font-weight="700" fill="#1f1a17">publicitarios</text>
			<text x="120" y="94" font-size="14" fill="#555">Tazas, bolígrafos y más</text>
		</g>

	</g>
</svg>
